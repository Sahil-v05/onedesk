<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LocalShare</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #181818;
    --surface2: #222222;
    --border: #2a2a2a;
    --border-hi: #3d3d3d;
    --text: #e8e4dc;
    --muted: #6b6860;
    --accent: #c8f542;
    --accent-dim: #9bbf30;
    --danger: #ff5252;
    --font-head: 'Syne', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    padding: 0;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .logo {
    font-family: var(--font-head);
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-dot {
    width: 10px;
    height: 10px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .status {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }

  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 24px;
    display: grid;
    grid-template-columns: 1fr;
    gap: 28px;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }

  /* Text section */
  .text-area-wrap { position: relative; }

  textarea {
    width: 100%;
    min-height: 180px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    line-height: 1.6;
    padding: 14px;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: var(--border-hi); }
  textarea::placeholder { color: var(--muted); }

  .btn-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  button {
    font-family: var(--font-mono);
    font-size: 12px;
    cursor: pointer;
    border-radius: 6px;
    border: 1px solid var(--border-hi);
    padding: 8px 16px;
    transition: all 0.15s;
    background: transparent;
    color: var(--text);
  }

  button:hover { background: var(--surface2); border-color: var(--text); }

  button.primary {
    background: var(--accent);
    color: #0f0f0f;
    border-color: var(--accent);
    font-weight: 500;
  }

  button.primary:hover { background: var(--accent-dim); border-color: var(--accent-dim); }

  button.danger {
    color: var(--danger);
    border-color: #3a1a1a;
  }
  button.danger:hover { background: #1a0808; border-color: var(--danger); }

  button:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 10px 18px;
    border-radius: 8px;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.25s;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* Drop zone */
  .drop-zone {
    border: 1.5px dashed var(--border-hi);
    border-radius: 8px;
    padding: 32px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface2);
    position: relative;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(200, 245, 66, 0.04);
  }

  .drop-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .drop-icon {
    font-size: 28px;
    margin-bottom: 8px;
    display: block;
  }

  .drop-label { font-size: 13px; color: var(--muted); }
  .drop-label span { color: var(--accent); }

  /* File list */
  .file-list { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }

  .file-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    transition: border-color 0.2s;
  }

  .file-item:hover { border-color: var(--border-hi); }

  .file-icon {
    width: 32px;
    height: 32px;
    background: rgba(200,245,66,0.1);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .file-info { flex: 1; min-width: 0; }
  .file-name {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .file-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .file-actions { display: flex; gap: 6px; flex-shrink: 0; }

  .btn-icon {
    width: 30px;
    height: 30px;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    font-size: 14px;
  }

  .empty-state {
    text-align: center;
    padding: 24px;
    color: var(--muted);
    font-size: 12px;
    border: 1px dashed var(--border);
    border-radius: 8px;
    margin-top: 12px;
  }

  /* Progress */
  .progress-bar-wrap {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 10px;
    overflow: hidden;
    display: none;
  }
  .progress-bar-wrap.active { display: block; }
  .progress-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width 0.3s;
  }

  /* Refresh indicator */
  .refresh-info {
    font-size: 10px;
    color: var(--muted);
    text-align: right;
    margin-top: 6px;
  }

  @media (max-width: 480px) {
    header { padding: 14px 16px; }
    main { padding: 20px 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    LocalShare
  </div>
  <div class="status">
    <div class="status-dot"></div>
    <span id="sync-status">syncing every 3s</span>
  </div>
</header>

<main>

  <!-- Text clipboard -->
  <div class="card">
    <div class="section-label">shared clipboard</div>
    <div class="text-area-wrap">
      <textarea id="textInput" placeholder="Paste or type anything here — code, links, notes...&#10;It will appear instantly on all connected devices."></textarea>
    </div>
    <div class="btn-row">
      <button class="primary" onclick="saveText()">Push to all devices</button>
      <button onclick="copyText()">Copy to clipboard</button>
      <button class="danger" onclick="clearText()">Clear</button>
    </div>
    <div class="refresh-info" id="text-updated">not yet synced</div>
  </div>

  <!-- File sharing -->
  <div class="card">
    <div class="section-label">file drop</div>

    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" multiple onchange="handleFileSelect(this.files)" />
      <span class="drop-icon">⬆</span>
      <div class="drop-label">Drag & drop files here or <span>click to browse</span></div>
      <div style="font-size:11px; color: var(--muted); margin-top:6px;">Any file type · Multiple files OK</div>
    </div>

    <div class="progress-bar-wrap" id="progressWrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="file-list" id="fileList"></div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script>
const API = '';
let lastTextPull = '';
let userEditing = false;
let editTimeout;

const textInput = document.getElementById('textInput');
const fileList = document.getElementById('fileList');
const toast = document.getElementById('toast');
const textUpdated = document.getElementById('text-updated');

// Mark user as editing when typing
textInput.addEventListener('input', () => {
  userEditing = true;
  clearTimeout(editTimeout);
  editTimeout = setTimeout(() => { userEditing = false; }, 3000);
});

function showToast(msg, duration = 2000) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), duration);
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

function formatTime(ts) {
  const d = new Date(ts);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function fileIcon(name) {
  const ext = name.split('.').pop().toLowerCase();
  const icons = {
    pdf: '📄', doc: '📝', docx: '📝', txt: '📃', md: '📃',
    jpg: '🖼', jpeg: '🖼', png: '🖼', gif: '🖼', svg: '🖼', webp: '🖼',
    mp4: '🎬', mov: '🎬', avi: '🎬', mkv: '🎬',
    mp3: '🎵', wav: '🎵', flac: '🎵',
    zip: '📦', rar: '📦', gz: '📦', tar: '📦',
    js: '⚙', ts: '⚙', py: '🐍', html: '🌐', css: '🎨', json: '⚙',
    xls: '📊', xlsx: '📊', csv: '📊', ppt: '📊', pptx: '📊',
  };
  return icons[ext] || '📁';
}

async function fetchState() {
  try {
    const res = await fetch(API + '/api/state');
    const data = await res.json();

    // Update text only if user isn't editing
    if (!userEditing && data.text !== lastTextPull) {
      textInput.value = data.text;
      lastTextPull = data.text;
      if (data.text) {
        const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        textUpdated.textContent = 'updated at ' + now;
      }
    }

    renderFiles(data.files || []);
  } catch(e) {
    document.getElementById('sync-status').textContent = 'connection lost...';
  }
}

function renderFiles(files) {
  if (!files.length) {
    fileList.innerHTML = '<div class="empty-state">No files shared yet. Drop files above to share.</div>';
    return;
  }

  files.sort((a, b) => b.time - a.time);

  fileList.innerHTML = files.map(f => `
    <div class="file-item" id="file-${CSS.escape(f.name)}">
      <div class="file-icon">${fileIcon(f.name)}</div>
      <div class="file-info">
        <div class="file-name" title="${f.name}">${f.name}</div>
        <div class="file-meta">${formatSize(f.size)} · ${formatTime(f.time)}</div>
      </div>
      <div class="file-actions">
        <button class="btn-icon" title="Download" onclick="downloadFile('${encodeURIComponent(f.name)}')">↓</button>
        <button class="btn-icon danger" title="Delete" onclick="deleteFile('${encodeURIComponent(f.name)}')">✕</button>
      </div>
    </div>
  `).join('');
}

async function saveText() {
  const text = textInput.value;
  await fetch(API + '/api/text', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text })
  });
  lastTextPull = text;
  userEditing = false;
  const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  textUpdated.textContent = 'pushed at ' + now;
  showToast('✓ Text pushed to all devices');
}

async function copyText() {
  const text = textInput.value;
  if (!text) { showToast('Nothing to copy'); return; }
  await navigator.clipboard.writeText(text);
  showToast('✓ Copied to clipboard');
}

async function clearText() {
  textInput.value = '';
  lastTextPull = '';
  await fetch(API + '/api/text', { method: 'DELETE' });
  textUpdated.textContent = 'cleared';
  showToast('Clipboard cleared');
}

function handleFileSelect(files) {
  if (!files.length) return;
  uploadFiles(files);
}

function uploadFiles(files) {
  const progressWrap = document.getElementById('progressWrap');
  const progressBar = document.getElementById('progressBar');

  progressWrap.classList.add('active');
  progressBar.style.width = '0%';

  const formData = new FormData();
  for (const f of files) formData.append('file', f);

  const xhr = new XMLHttpRequest();
  xhr.open('POST', API + '/api/upload');

  xhr.upload.onprogress = (e) => {
    if (e.lengthComputable) {
      progressBar.style.width = (e.loaded / e.total * 100) + '%';
    }
  };

  xhr.onload = () => {
    progressBar.style.width = '100%';
    setTimeout(() => {
      progressWrap.classList.remove('active');
      progressBar.style.width = '0%';
    }, 800);
    showToast(`✓ ${files.length} file${files.length > 1 ? 's' : ''} uploaded`);
    fetchState();
    document.getElementById('fileInput').value = '';
  };

  xhr.onerror = () => {
    showToast('Upload failed', 3000);
    progressWrap.classList.remove('active');
  };

  xhr.send(formData);
}

function downloadFile(encodedName) {
  window.location = API + '/api/download/' + encodedName;
}

async function deleteFile(encodedName) {
  await fetch(API + '/api/file/' + encodedName, { method: 'DELETE' });
  showToast('File removed');
  fetchState();
}

// Drag & drop
const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  uploadFiles(e.dataTransfer.files);
});

// Ctrl+Enter to save text
textInput.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') saveText();
});

// Auto-sync every 3 seconds
fetchState();
setInterval(fetchState, 3000);
</script>
</body>
</html>
